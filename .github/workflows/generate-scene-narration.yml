name: Generate Scene Narration

on:
  workflow_dispatch:
    inputs:
      voice:
        description: "Edge TTS voice (e.g., en-US-AriaNeural)"
        required: false
        default: "en-US-AriaNeural"
      rate:
        description: "Speech rate adjustment"
        required: false
        default: "+0%"
      pitch:
        description: "Speech pitch adjustment"
        required: false
        default: "+0Hz"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install edge-tts

      - name: Generate narration files
        run: |
          python scripts_generate_scene_narration.py \
            --voice "${{ github.event.inputs.voice || 'en-US-AriaNeural' }}" \
            --rate "${{ github.event.inputs.rate || '+0%' }}" \
            --pitch "${{ github.event.inputs.pitch || '+0Hz' }}"


      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          shopt -s nullglob
          files=(assets/intro_00.mp3 assets/scene_*.mp3 assets/manifest.json)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No generated files found in assets/."
            exit 1
          fi

          git add "${files[@]}"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update generated scene narration assets"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Upload generated audio artifact
        uses: actions/upload-artifact@v4
        with:
          name: scene-narration-mp3
          path: |
            assets/intro_00.mp3
            assets/scene_*.mp3
            assets/manifest.json
          if-no-files-found: error
